services:
  postgres:
    image: postgres:16-alpine
    container_name: creatoros-postgres
    environment:
      POSTGRES_DB: creatoros
      POSTGRES_USER: creatoros
      POSTGRES_PASSWORD: creatoros
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # schema runs automatically on first startup
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creatoros"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creatoros-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata: